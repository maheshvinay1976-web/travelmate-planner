{% extends 'base.html' %}
{% block content %}
<div class="glass-card planner-card">
    <h2>Plan Your Trip</h2>
    <form method="POST">
        <input type="text" name="destination" placeholder="Destination" required>
        <input type="number" name="days" placeholder="Number of Days" required>
        <button type="submit" class="btn btn-success">Plan Trip</button>
    </form>
</div>
{% endblock %}
