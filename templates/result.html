<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Trip | TravelMate</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            background: url('/static/bg1.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 50px;
            max-width: 500px;
            margin: 80px auto;
            color: #fff;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            text-align: center;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        input {
            font-size: 1rem;
        }

        button {
            background-color: rgba(255,255,255,0.2);
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2>Plan Your Trip</h2>
        <form method="POST" action="{{ url_for('plan') }}">
            <label>Destination:</label>
            <input type="text" name="destination" placeholder="Enter city or place" required>

            <label>Number of Days:</label>
            <input type="number" name="days" placeholder="How many days?" required>

            <label>Budget (₹):</label>
            <input type="number" name="budget" placeholder="Enter total budget" required>

            <label>Number of Members:</label>
            <input type="number" name="members" placeholder="How many people?" required>

            <button type="submit">Plan Trip</button>
        </form>
    </div>
</body>
</html>
