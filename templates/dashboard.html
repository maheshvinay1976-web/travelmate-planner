<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h2>Your Trips</h2>

<a href="/plan">➕ Plan Trip</a>
<a href="/logout">🚪 Logout</a>

<h3>Total Trips: {{ total_trips }}</h3>
<h3>Total Spent: ₹{{ total_spent }}</h3>

<table>
<tr>
    <th>Destination</th>
    <th>Days</th>
    <th>Cost</th>
    <th>❌</th>
</tr>

{% for trip in trips %}
<tr>
    <td>{{ trip[2] }}</td>
    <td>{{ trip[3] }}</td>
    <td>₹{{ trip[4] }}</td>
    <td>
        <form action="/delete_trip/{{ trip[0] }}" method="POST">
            <button class="delete-btn">×</button>
        </form>
    </td>
</tr>
{% endfor %}
</table>

</body>
</html>
